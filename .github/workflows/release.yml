name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      # ────────────────────────────────────────────────
      # Windows 部分：打包成 Inno Setup 安裝檔
      # ────────────────────────────────────────────────
      - name: Publish Windows (self-contained)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF
          $VERSION = $tag -replace '^.*/v', ''
          $FULL_VERSION = "$VERSION.0"
          Write-Host "Building Windows Version: $FULL_VERSION"
          dotnet publish OB.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$FULL_VERSION `
            -p:FileVersion=$FULL_VERSION `
            -p:AssemblyVersion=$FULL_VERSION `
            -p:InformationalVersion=$FULL_VERSION `
            -o publish/win-x64

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $isccPath)) {
            Write-Host "Installing Inno Setup..."
            choco install innosetup --no-progress -y
          }
          echo "ISCC_PATH=$isccPath" >> $env:GITHUB_ENV

      - name: Create Inno Setup Script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF
          $VERSION = $tag -replace '^.*/v', ''
          $script = @"
          [Setup]
          AppName=OB 檢測系統
          AppVersion=$VERSION
          DefaultDirName={autopf}\OB
          DefaultGroupName=OB
          UninstallDisplayIcon={app}\OB.exe
          Compression=lzma2
          SolidCompression=yes
          OutputDir=installer
          OutputBaseFilename=OB-win-x64
          PrivilegesRequired=admin
          
          [Files]
          Source: "$pwd\publish\win-x64\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Icons]
          Name: "{group}\OB 檢測系統"; Filename: "{app}\OB.exe"
          Name: "{autodesktop}\OB 檢測系統"; Filename: "{app}\OB.exe"
          
          [Run]
          Filename: "{app}\OB.exe"; Description: "啟動 OB 檢測系統"; Flags: postinstall nowait skipifsilent
          "@
          $script | Out-File -FilePath setup.iss -Encoding utf8

      - name: Compile Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:ISCC_PATH" setup.iss

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-installer
          path: installer/OB-win-x64.exe

      # ────────────────────────────────────────────────
      # macOS 部分：打包成 .app 再壓縮為 zip
      # ────────────────────────────────────────────────
      - name: Publish macOS (self-contained)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          FULL_VERSION="${VERSION}.0"
          dotnet publish OB.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:Version=$FULL_VERSION \
            -p:FileVersion=$FULL_VERSION \
            -p:AssemblyVersion=$FULL_VERSION \
            -p:InformationalVersion=$FULL_VERSION \
            -o publish/osx-x64

      - name: Create .app bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          APP_NAME="OB.app"
          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"
          cp -r publish/osx-x64/* "$APP_NAME/Contents/MacOS/"
          
          cat > "$APP_NAME/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>OB</string>
            <key>CFBundleDisplayName</key>
            <string>OB 檢測系統</string>
            <key>CFBundleIdentifier</key>
            <string>com.yourcompany.OB</string>
            <key>CFBundleVersion</key>
            <string>$VERSION</string>
            <key>CFBundleShortVersionString</key>
            <string>$VERSION</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleExecutable</key>
            <string>OB</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          
          zip -r "OB-osx-x64.zip" OB.app

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: osx-x64-zip
          path: OB-osx-x64.zip

  # ────────────────────────────────────────────────
  # 建立 GitHub Release 並使用工具生成帶簽名的 appcast.xml
  # ────────────────────────────────────────────────
  create_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install NetSparkle AppCast Generator
        run: dotnet tool install --global NetSparkleUpdater.Tools.AppCastGenerator

      - name: Prepare Assets and Generate Signed AppCast
        shell: bash
        env:
          PRIVATE_KEY: ${{ secrets.NETSPARKLE_PRIVATE_KEY }}
        run: |
          mkdir release_binaries
          # 移動檔案並統一名稱
          cp artifacts/win-x64-installer/OB-win-x64.exe release_binaries/
          cp artifacts/osx-x64-zip/OB-osx-x64.zip release_binaries/
          
          VERSION="${GITHUB_REF#refs/tags/v}"
          
          # 調用工具生成 appcast.xml (包含數位簽名)
          # 注意：URL 必須指向你的 Release 下載地址
          netsparkle-generate-appcast \
            -n "OB 檢測系統" \
            -u "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" \
            -b release_binaries \
            -e "exe,zip" \
            --private-key-override "$PRIVATE_KEY" \
            --human-readable \
            --file-version "$VERSION.0" \
            --output-file-name appcast
          
          # 工具生成的文件名通常會是 appcast.xml，檢查一下
          ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release_binaries/OB-win-x64.exe
            release_binaries/OB-osx-x64.zip
            appcast.xml
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}