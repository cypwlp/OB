name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish for ${{ matrix.os }} (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            executable: OB.exe
          - os: macos-13                # Intel (x64)
            rid: osx-x64
            executable: OB
          - os: macos-latest             # Apple Silicon (ARM64)
            rid: osx-arm64
            executable: OB
          - os: ubuntu-22.04
            rid: linux-x64
            executable: OB

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils libglib2.0-bin

      - name: Publish Application
        run: |
          dotnet publish -c Release --runtime ${{ matrix.rid }} --self-contained true -o ./publish

      - name: Sync Previous Releases (Delta Updates)
        continue-on-error: true
        run: |
          vpk download github --repoUrl https://github.com/${{ github.repository }} --outputDir ./Releases

      # Windows 平台：將 PNG 轉換為 ICO
      - name: Install ImageMagick (Windows)
        if: runner.os == 'Windows'
        run: choco install imagemagick -y

      - name: Convert PNG to ICO (Windows only)
        if: runner.os == 'Windows'
        run: |
          magick convert ./Assets/app-icon.png -define icon:auto-resize=256,128,64,48,32,16 ./Assets/app-icon.ico

      # macOS 平台：將 PNG 轉換為 ICNS
      - name: Convert PNG to ICNS (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p AppIcon.iconset
          sips -z 16 16     Assets/app-icon.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32     Assets/app-icon.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32     Assets/app-icon.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64     Assets/app-icon.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128   Assets/app-icon.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256   Assets/app-icon.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256   Assets/app-icon.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512   Assets/app-icon.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512   Assets/app-icon.png --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 Assets/app-icon.png --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o Assets/app-icon.icns

      - name: Velopack Pack
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          PACK_ARGS=(
            --packId "OB"
            --packVersion "$VERSION"
            --packDir "./publish"
            --mainExe "${{ matrix.executable }}"
            --outputDir "./Releases"
          )

          if [ "${{ runner.os }}" == "macOS" ]; then
            PACK_ARGS+=(--icon "./Assets/app-icon.icns")
            PACK_ARGS+=(--bundleId "com.cypilu.ob")  
          elif [ "${{ runner.os }}" == "Windows" ]; then
            PACK_ARGS+=(--icon "./Assets/app-icon.ico")
          else
            # Linux
            PACK_ARGS+=(--icon "./Assets/app-icon.png")
          fi
          vpk pack "${PACK_ARGS[@]}"
          if [ "${{ runner.os }}" == "macOS" ]; then
            cd ./Releases
            for f in OB-*-osx-*; do
              if [ -f "$f" ]; then
                newname=$(echo "$f" | sed "s/-osx-/-${{ matrix.rid }}-/")
                mv "$f" "$newname"
              fi
            done
            if [ -f "RELEASES-osx" ]; then
              mv RELEASES-osx "RELEASES-${{ matrix.rid }}"
            fi
            if [ -f "releases.osx.json" ]; then
              mv releases.osx.json "releases.${{ matrix.rid }}.json"
            fi
            cd ..
          fi
      - name: List Release Directory
        run: ls -la ./Releases
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./Releases/*.exe
            ./Releases/*.nupkg
            ./Releases/*.pkg
            ./Releases/*.zip
            ./Releases/*.AppImage
            ./Releases/RELEASES*
            ./Releases/releases.*.json
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}