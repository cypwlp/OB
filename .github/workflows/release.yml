name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish for current OS
        run: |
          # 從 tag 自動取得版本號 (v1.0.8 → 1.0.8)
          VERSION=${GITHUB_REF_NAME#v}
          
          if [ "$RUNNER_OS" == "Windows" ]; then
            dotnet publish -c Release -o publish/win-x64 \
              --self-contained false -r win-x64 \
              /p:Version=$VERSION \
              /p:FileVersion=$VERSION.0 \
              /p:AssemblyVersion=$VERSION.0
          else
            dotnet publish -c Release -o publish/osx-x64 \
              --self-contained false -r osx-x64 \
              /p:Version=$VERSION \
              /p:FileVersion=$VERSION.0 \
              /p:AssemblyVersion=$VERSION.0
          fi
        shell: bash

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-app
          path: publish/win-x64/

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: osx-x64-app
          path: publish/osx-x64/

  create_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create ZIP packages
        run: |
          cd artifacts/win-x64-app && zip -r ../../OB-win-x64.zip . && cd ../..
          cd artifacts/osx-x64-app && zip -r ../../OB-osx-x64.zip . && cd ../..

      - name: Generate appcast.xml
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")
          WIN_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/OB-win-x64.zip"
          OSX_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/OB-osx-x64.zip"
          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Your App Updates</title>
              <item>
                <title>Version $VERSION</title>
                <pubDate>$DATE</pubDate>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:releaseNotesLink>https://your-update-server.com/release-notes.html</sparkle:releaseNotesLink>
                <enclosure url="$WIN_URL"
                           sparkle:os="windows"
                           sparkle:installerArguments="/SILENT"
                           length="$(stat -c%s OB-win-x64.zip)"
                           type="application/zip" />
                <enclosure url="$OSX_URL"
                           sparkle:os="macos"
                           length="$(stat -c%s OB-osx-x64.zip)"
                           type="application/zip" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            OB-win-x64.zip
            OB-osx-x64.zip
            appcast.xml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}