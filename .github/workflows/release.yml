name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 包含三種作業系統
        include:
          - os: windows-latest
            rid: win-x64
            executable: OB.exe
          - os: macos-latest
            rid: osx-x64
            executable: OB
          - os: ubuntu-22.04
            rid: linux-x64
            executable: OB

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      # Linux 環境需要額外安裝工具來打包 AppImage
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils libglib2.0-bin

      - name: Publish Application
        run: |
          dotnet publish -c Release --runtime ${{ matrix.rid }} --self-contained true -o ./publish

      - name: Sync Previous Releases (Delta Updates)
        continue-on-error: true
        # vpk download 會根據當前 OS 下載對應的歷史版本
        run: |
          vpk download github --repoUrl https://github.com/${{ github.repository }} --outputDir ./Releases

      - name: Velopack Pack
        shell: bash
        run: |
          # 基礎參數
          PACK_ARGS=(
            --packId "OB"
            --packVersion "${{ github.ref_name }}"
            --packDir "./publish"
            --mainExe "${{ matrix.executable }}"
            --outputDir "./Releases"
            --icon "./Assets/app-icon.png"
          )

          # macOS 額外需要的參數
          if [ "${{ runner.os }}" == "macOS" ]; then
            PACK_ARGS+=(--bundleId "com.yourcompany.ob")
          fi

          vpk pack "${PACK_ARGS[@]}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # 上傳所有生成的安裝包與更新數據
          # Windows: .exe, .nupkg
          # macOS: .pkg, .zip
          # Linux: .AppImage
          files: |
            ./Releases/*.exe
            ./Releases/*.nupkg
            ./Releases/*.pkg
            ./Releases/*.zip
            ./Releases/*.AppImage
            ./Releases/RELEASES*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}