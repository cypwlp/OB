name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            executable: OB.exe
          - os: macos-latest
            rid: osx-x64
            executable: OB
          - os: ubuntu-22.04
            rid: linux-x64
            executable: OB

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils libglib2.0-bin

      - name: Publish Application
        run: |
          dotnet publish -c Release --runtime ${{ matrix.rid }} --self-contained true -o ./publish

      - name: Sync Previous Releases (Delta Updates)
        continue-on-error: true
        run: |
          vpk download github --repoUrl https://github.com/${{ github.repository }} --outputDir ./Releases

      # macOS 需要將 PNG 圖標轉換為 .icns 格式
      - name: Convert PNG to ICNS (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p AppIcon.iconset
          # 產生多種尺寸圖標（可根據需要增減）
          sips -z 16 16     Assets/app-icon.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32     Assets/app-icon.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32     Assets/app-icon.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64     Assets/app-icon.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128   Assets/app-icon.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256   Assets/app-icon.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256   Assets/app-icon.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512   Assets/app-icon.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512   Assets/app-icon.png --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 Assets/app-icon.png --out AppIcon.iconset/icon_512x512@2x.png
          # 轉換為 .icns
          iconutil -c icns AppIcon.iconset -o Assets/app-icon.icns

      - name: Velopack Pack
        shell: bash
        run: |
          # 去除 tag 名稱前的 'v' 前綴，獲得純版本號
          VERSION="${GITHUB_REF_NAME#v}"

          # 基礎參數
          PACK_ARGS=(
            --packId "OB"
            --packVersion "$VERSION"
            --packDir "./publish"
            --mainExe "${{ matrix.executable }}"
            --outputDir "./Releases"
          )

          # 根據作業系統設定圖標與 bundle ID
          if [ "${{ runner.os }}" == "macOS" ]; then
            # macOS 使用 .icns 圖標
            PACK_ARGS+=(--icon "./Assets/app-icon.icns")
            PACK_ARGS+=(--bundleId "com.yourcompany.ob")   # 請替換為您的實際 bundle ID
          else
            # Windows 與 Linux 使用 .png 圖標
            PACK_ARGS+=(--icon "./Assets/app-icon.png")
          fi

          vpk pack "${PACK_ARGS[@]}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./Releases/*.exe
            ./Releases/*.nupkg
            ./Releases/*.pkg
            ./Releases/*.zip
            ./Releases/*.AppImage
            ./Releases/RELEASES*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}