name: Build and Release

on:
  push:
    tags:
      - 'v*'          # 只有打 tag 时才触发构建发布

jobs:
  build:
    runs-on: ubuntu-latest   # Gitee 提供的 Linux 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build for Windows (x64)
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish/win-x64

      - name: Build for macOS (x64)
        run: |
          dotnet publish -c Release -r osx-x64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish/osx-x64

      - name: Build for macOS (ARM64)   # Apple Silicon 支持
        run: |
          dotnet publish -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish/osx-arm64

      - name: Create ZIP packages
        run: |
          cd publish
          zip -r ../MyApp-win-x64.zip win-x64
          zip -r ../MyApp-osx-x64.zip osx-x64
          zip -r ../MyApp-osx-arm64.zip osx-arm64
          cd ..

      - name: Generate appcast.xml
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}   # 提取版本号，例如 v1.2.3 -> 1.2.3
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")

          # 定义下载链接（使用 Gitee Releases 的附件 URL）
          WIN_URL="https://gitee.com/你的用户名/你的仓库/releases/download/v${VERSION}/MyApp-win-x64.zip"
          OSX_X64_URL="https://gitee.com/你的用户名/你的仓库/releases/download/v${VERSION}/MyApp-osx-x64.zip"
          OSX_ARM64_URL="https://gitee.com/你的用户名/你的仓库/releases/download/v${VERSION}/MyApp-osx-arm64.zip"

          # 生成 appcast.xml（简化示例，实际应包含多个更新项）
          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>MyApp 更新日志</title>
              <item>
                <title>版本 ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <description><![CDATA[更新内容说明（可从 CHANGELOG 中读取）]]></description>
                <enclosure url="${WIN_URL}" sparkle:os="windows" length="0" type="application/octet-stream" />
                <enclosure url="${OSX_X64_URL}" sparkle:os="macos" sparkle:architecture="x86_64" length="0" type="application/octet-stream" />
                <enclosure url="${OSX_ARM64_URL}" sparkle:os="macos" sparkle:architecture="arm64" length="0" type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Create Release and Upload Assets
        uses: gitee-actions/release-action@v1   # 使用 Gitee 的 release 插件
        with:
          token: ${{ secrets.GITEE_TOKEN }}      # 需要在仓库设置中添加 Personal Access Token
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## 更新内容
            - 请在此填写更新日志
          draft: false
          prerelease: false
          files: |
            ./MyApp-win-x64.zip
            ./MyApp-osx-x64.zip
            ./MyApp-osx-arm64.zip
            ./appcast.xml